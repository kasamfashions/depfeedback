                      className="w-full pl-12 pr-5 py-4 rounded-xl border-2 border-white/50 bg-white/40 backdrop-blur-md focus:border-pink-500 focus:bg-white/80 outline-none transition-all shadow-sm text-lg placeholder-gray-500"
                    />
                    <Phone className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500" size={24} />
                  </div>
                </div>

                <h3 className="text-2xl font-bold text-center mb-8 mt-2 serif-font text-gray-800">✨ Select the <span className="text-transparent bg-clip-text bg-gradient-to-r from-pink-600 to-purple-600">Department</span></h3>
                <div className={`transition-all duration-500 ${!customerName.trim() || !phoneNumber.trim() ? 'opacity-50 pointer-events-none grayscale' : 'opacity-100'}`}>
                  <div className="grid grid-cols-3 gap-2 md:gap-4 lg:gap-6 mb-12">{DEPARTMENT_OPTIONS.map((option) => (<OptionCard key={option.id} option={option} isSelected={selectedDepartmentId === option.id} onClick={() => setSelectedDepartmentId(option.id)} />))}</div>
                  
                  {selectedDepartmentId && (
                    <div className="max-w-3xl mx-auto mb-10">
                      <h3 className="text-xl font-bold mb-6 text-gray-800 serif-font text-center">Please rate the following:</h3>
                      <div className="space-y-6">
                        {SPECIFIC_QUESTIONS.map(q => (
                          <div key={q.id} className="bg-white/60 p-4 rounded-2xl shadow-sm border border-white/50 flex flex-col md:flex-row items-center justify-between gap-4">
                            <span className="font-semibold text-gray-700 text-center md:text-left flex-1">{q.text}</span>
                            <div className="flex gap-2">
                              {[1, 2, 3, 4, 5].map(star => (
                                <button
                                  key={star}
                                  onClick={() => setQuestionRatings(prev => ({ ...prev, [q.id]: star }))}
                                  className={`text-2xl transition-all ${questionRatings[q.id] >= star ? 'text-yellow-500 scale-110' : 'text-gray-300 hover:text-yellow-300'}`}
                                >
                                  ★
                                </button>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Rating Section - Added */}
                  <div className="max-w-3xl mx-auto mb-10 text-center">
                    <h3 className="text-xl font-bold mb-6 text-gray-800 serif-font">Rate your Overall Experience</h3>
                    <div className="flex justify-center gap-4 md:gap-8">
                      {RATING_OPTIONS.map((opt) => (
                        <button
                          key={opt.value}
                          onClick={() => setRating(opt.value)}
                          className={`
                                        text-4xl md:text-5xl transition-all duration-300 transform hover:scale-125 focus:outline-none drop-shadow-md
                                        ${rating === opt.value
                              ? 'scale-125 drop-shadow-xl'
                              : 'opacity-80 hover:opacity-100'
                            }
                                    `}
                          title={opt.label}
                          type="button"
                        >
                          {opt.emoji}
                        </button>
                      ))}
                    </div>
                    <p className="mt-3 text-sm font-medium text-pink-600 h-6">
                      {rating ? RATING_OPTIONS.find(r => r.value === rating)?.label : ''}
                    </p>
                  </div>

                  <div className="flex justify-center mb-8"><button onClick={handleFeedbackSubmit} disabled={!selectedDepartmentId || isSubmitting || !customerName.trim() || !phoneNumber.trim() || SPECIFIC_QUESTIONS.some(q => !questionRatings[q.id]) || !rating} className={`relative group flex items-center justify-center gap-3 px-10 py-4 rounded-full text-lg font-bold shadow-xl transition-all duration-300 ${(!selectedDepartmentId || !customerName.trim() || !phoneNumber.trim() || SPECIFIC_QUESTIONS.some(q => !questionRatings[q.id]) || !rating) ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'bg-gray-900 text-white hover:bg-black hover:scale-105'}`}>{isSubmitting ? <><Loader2 className="animate-spin" /> Submitting Feedback...</> : <>Submit Feedback <ArrowRight size={20} /></>}</button></div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
